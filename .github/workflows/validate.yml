name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Static validation
        run: ./validate.sh --shellcheck --install-audit

      - name: Smoke tests (CI mode)
        run: ./smoke_test.sh --ci
